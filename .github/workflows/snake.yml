name: Gerar animação snake das contribuições

on:
  # roda automaticamente a cada 24h
  schedule:
    - cron: "0 6 * * *"
  # permite disparar manualmente pela aba Actions
  workflow_dispatch:
  # roda a cada push na main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # gera o SVG do snake a partir do grid de contribuições do dono do repo
      - name: Gerar SVGs do snake (claro + escuro)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0a4d5e&color_dots=#e8f4f8,#a9def0,#5fc9e6,#1aa9d4,#00b4d8
            dist/github-contribution-grid-snake-dark.svg?color_snake=#e6edf3&color_dots=#161b22,#0a3a48,#0a6b83,#0e9dc0,#00d4f5

      # publica o conteúdo de dist/ na branch "output"
      # fica acessível em https://raw.githubusercontent.com/<user>/<repo>/output/<arquivo>
      - name: Publicar na branch output
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
