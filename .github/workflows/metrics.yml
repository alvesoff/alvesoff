name: Gerar card de métricas (GitHub stats)

on:
  # roda automaticamente todo dia
  schedule:
    - cron: "30 6 * * *"
  # permite disparar manualmente pela aba Actions
  workflow_dispatch:

jobs:
  metrics:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # gera github-metrics.svg e commita na branch padrão (main)
      # usa o GITHUB_TOKEN embutido — nenhum segredo externo necessário
      - name: Gerar github-metrics.svg
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: alvesoff
          template: classic
          config_timezone: America/Sao_Paulo
          base: header
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
